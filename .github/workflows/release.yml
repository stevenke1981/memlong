# =============================================================================
# Release workflow — memlong
#
# Triggers:
#   - Push a tag matching v*  (e.g. v0.1.0, v0.2.0-rc1)
#   - Manual workflow_dispatch (choose a semver like 0.1.0)
#
# What it does:
#   1. cargo build --release (MSVC toolchain, x86_64-pc-windows-msvc)
#   2. Package binaries + skills into a ZIP archive
#   3. Compute SHA256 checksum
#   4. Create a GitHub Release with the archive and checksum attached
# =============================================================================

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g. 0.1.0)"
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  BINARY_SERVER: memory-mcp-server
  BINARY_CLI: memory-cli
  ARCHIVE_NAME: opencode-memory

jobs:
  build:
    name: Build & Package (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive_ext: zip

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.target }})
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build release binaries
        run: cargo build --release --target ${{ matrix.target }}
        shell: bash

      - name: Prepare packaging directory
        run: |
          PKG_DIR="target/packaging/${{ env.ARCHIVE_NAME }}"
          mkdir -p "$PKG_DIR/skills"
          echo "PKG_DIR=$PKG_DIR" >> "$GITHUB_ENV"
        shell: bash

      - name: Copy binaries
        run: |
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_SERVER }}.exe" "${{ env.PKG_DIR }}/${{ env.BINARY_SERVER }}.exe"
          cp "target/${{ matrix.target }}/release/${{ env.BINARY_CLI }}.exe" "${{ env.PKG_DIR }}/${{ env.BINARY_CLI }}.exe"
        shell: bash

      - name: Copy skill files
        run: |
          if ls skills/*.md 1>/dev/null 2>&1; then
            cp skills/*.md "${{ env.PKG_DIR }}/skills/"
          fi
        shell: bash

      - name: Determine version tag
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW_VERSION="${{ inputs.version }}"
          else
            RAW_VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "raw=$RAW_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$RAW_VERSION" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Create archive
        run: |
          $rawVersion = "${{ steps.version.outputs.raw }}"
          $tagVersion = "${{ steps.version.outputs.tag }}"
          $archiveName = "${{ env.ARCHIVE_NAME }}-${tagVersion}-${{ matrix.target }}.${{ matrix.archive_ext }}"
          Compress-Archive -Path "target/packaging/${{ env.ARCHIVE_NAME }}/*" -DestinationPath $archiveName -Force
          echo "ARCHIVE=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          echo "ARCHIVE_PATH=$archiveName" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
        shell: pwsh

      - name: Compute SHA256 checksum
        id: checksum
        run: |
          if command -v sha256sum &>/dev/null; then
            sha256sum "${{ env.ARCHIVE_PATH }}" > "${{ env.ARCHIVE_PATH }}.sha256"
            HASH=$(cut -d' ' -f1 "${{ env.ARCHIVE_PATH }}.sha256")
          else
            HASH=$(certutil -hashfile "${{ env.ARCHIVE_PATH }}" SHA256 | \
              awk 'NR==2{print tolower($1)}')
            echo "$HASH  ${{ env.ARCHIVE_PATH }}" > "${{ env.ARCHIVE_PATH }}.sha256"
          fi
          echo "hash=$HASH" >> "$GITHUB_OUTPUT"
        shell: bash

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARCHIVE_NAME }}-${{ steps.version.outputs.tag }}-${{ matrix.target }}
          path: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.ARCHIVE_PATH }}.sha256

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: Release ${{ steps.version.outputs.tag }}
          body: |
            ## memlong ${{ steps.version.outputs.tag }}

            ### What's Changed

            See commit history for details.

            ### Downloads

            | File | SHA256 |
            |------|--------|
            | `${{ env.ARCHIVE_PATH }}` | `${{ steps.checksum.outputs.hash }}` |
          draft: false
          prerelease: ${{ contains(steps.version.outputs.tag, '-') }}
          files: |
            ${{ env.ARCHIVE_PATH }}
            ${{ env.ARCHIVE_PATH }}.sha256
